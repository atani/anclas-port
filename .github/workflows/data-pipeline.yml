name: data-pipeline

# q-league / anclas.jp を取得して正規化JSONを生成し、差分があれば commit する。
# 生成物（data/*.json）は GitHub Pages で配信し、iOS アプリが読む。
# FCM push / Pages 設定は Phase 2 で追加する。

on:
  schedule:
    # 5分間隔（GitHub 側の都合で多少遅延する。public リポジトリ前提）
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/data-pipeline.yml"

permissions:
  contents: write

concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Typecheck & test
        working-directory: scripts
        run: |
          npm run typecheck
          npm test

      - name: Generate JSON
        working-directory: scripts
        run: npm run generate

      - name: Commit if changed
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "差分なし。commit をスキップします。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: 試合・順位・選手データを自動更新（$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')）"
          git push
